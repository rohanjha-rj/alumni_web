<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Directory | BCE Alumni Welfare Association</title>
    <meta name="description"
        content="Connect with fellow BCE graduates across the globe. Professional directory for Bhagalpur College of Engineering.">
    <link rel="icon" href="/assets/img/branding/logo.png" type="image/png">

    <!-- Modular Styles -->
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/layout.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/pages/directory.css">
</head>

<body>
    <div class="scroll-progress" id="scrollProgress"></div>

    <!-- Header Component Placeholder -->
    <div id="header-placeholder"></div>

    <header class="page-banner-premium reveal"
        style="background: linear-gradient(135deg, rgba(15,23,42,0.85) 0%, rgba(30,41,59,0.85) 100%), url('/assets/img/college/college-16.jpeg'); background-size: cover; background-position: center;">
        <div class="container">
            <h1>Alumni Directory</h1>
            <p>Connect with fellow BCEians across batches and branches. Our growing network spans industries and
                continents.</p>
        </div>
    </header>

    <main class="container">
        <div class="directory-layout">
            <aside class="filter-sidebar">
                <div class="filter-group">
                    <label>Search Members</label>
                    <input type="text" id="searchInput" placeholder="Search name or company...">
                </div>
                <div class="filter-group">
                    <label>Engineering Branch</label>
                    <select id="branchFilter">
                        <option value="all">All Branches</option>
                        <option value="CSE">Computer Science (CSE)</option>
                        <option value="ECE">Electronics (ECE)</option>
                        <option value="ME">Mechanical (ME)</option>
                        <option value="Civil">Civil Engineering</option>
                        <option value="EE">Electrical (EE)</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>Graduation Batch</label>
                    <select id="batchFilter">
                        <option value="all">All Batches</option>
                        <option value="2024">2024</option>
                        <option value="2020">2020</option>
                        <option value="2015">2015</option>
                        <option value="2010">2010</option>
                        <option value="2000">2000</option>
                        <option value="1990">1990</option>
                    </select>
                </div>
                <button class="btn-primary" id="resetFilters" style="width:100%; padding: 0.8rem;">Reset Filters</button>
            </aside>

            <div>
                <div class="result-count">
                    <span id="countText">Loading directory...</span>
                    <button class="btn-secondary"
                        style="color:var(--nav-navy); border-color:var(--nav-navy); padding: 0.5rem 1rem; font-size: 0.8rem; border-radius: 8px;">Export
                        Page (PDF)</button>
                </div>
                <div id="alumniList" class="alumni-grid">
                    <!-- Dynamic Content -->
                </div>
            </div>
        </div>
    </main>

    <!-- Footer Component Placeholder -->
    <div id="footer-placeholder"></div>

    <button class="back-to-top" id="backToTop">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round">
            <polyline points="18 15 12 9 6 15" />
        </svg>
    </button>

    <!-- Scripts -->
    <script src="/js/data/alumni.js"></script>
    <script src="/js/core/components.js"></script>
    <script src="/js/core/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const list = document.getElementById('alumniList');
            const search = document.getElementById('searchInput');
            const branch = document.getElementById('branchFilter');
            const batch = document.getElementById('batchFilter');
            const countText = document.getElementById('countText');

            function render(data) {
                if (!list) return;
                list.innerHTML = '';
                countText.innerText = `${data.length} Members Found`;
                data.forEach(a => {
                    const card = document.createElement('a');
                    card.className = 'alumni-card reveal active';
                    card.innerHTML = `
                        <div class="card-img">
                            <img src="${a.image}" alt="${a.name}">
                        </div>
                        <h3 class="card-name">${a.name}</h3>
                        <span class="card-role">${a.role} @ ${a.company}</span>
                        <div class="badge-row">
                            <span class="badge-chip">${a.branch}</span>
                            <span class="badge-chip">${a.country || 'India'}</span>
                        </div>
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-top:1.5rem; padding-top:1rem; border-top:1px solid var(--bg-secondary);">
                            <span class="batch-tag">Class of ${a.batch}</span>
                            <span style="font-weight:700; font-size:0.85rem; color:var(--nav-navy);">Connect →</span>
                        </div>
                    `;
                    list.appendChild(card);
                });
            }

            function filter() {
                const s = search.value.toLowerCase();
                const br = branch.value;
                const ba = batch.value;
                const filtered = alumniData.filter(a => {
                    const mSearch = a.name.toLowerCase().includes(s) || a.role.toLowerCase().includes(s);
                    const mBranch = br === 'all' || a.branch === br;
                    const mBatch = ba === 'all' || a.batch === ba;
                    return mSearch && mBranch && mBatch;
                });
                render(filtered);
            }

            if (search) [search, branch, batch].forEach(el => el.addEventListener('input', filter));
            const resetBtn = document.getElementById('resetFilters');
            if (resetBtn) resetBtn.onclick = () => {
                search.value = ''; branch.value = 'all'; batch.value = 'all';
                render(alumniData);
            };

            if (typeof alumniData !== 'undefined') render(alumniData);
        });
    </script>
</body>

</html>
