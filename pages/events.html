<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events | BCE Alumni Welfare Association</title>
    <meta name="description" content="Upcoming and past alumni events organized by the BCE Alumni Welfare Association.">
    <link rel="icon" href="/assets/img/branding/logo.png" type="image/png">

    <!-- Modular Styles -->
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/layout.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/pages/events.css">
</head>

<body>
    <div class="scroll-progress" id="scrollProgress"></div>

    <!-- Header Component Placeholder -->
    <div id="header-placeholder"></div>

    <header class="page-banner-premium reveal"
        style="background: linear-gradient(135deg, rgba(15,23,42,0.85) 0%, rgba(30,41,59,0.85) 100%), url('/assets/img/college/college-9.jpeg'); background-size: cover; background-position: center;">
        <div class="container">
            <h1>Alumni Events</h1>
            <p>Stay connected through reunions, seminars, and community gatherings organized by the BCE Alumni Welfare
                Association.</p>
        </div>
    </header>

    <main class="container" style="padding:8rem 2rem;">
        <!-- Tabs -->
        <div class="events-tabs reveal">
            <button class="tab-btn active" id="tabUpcoming" onclick="switchTab('upcoming')">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2">
                    <rect x="3" y="4" width="18" height="18" rx="2" />
                    <line x1="16" y1="2" x2="16" y2="6" />
                    <line x1="8" y1="2" x2="8" y2="6" />
                    <line x1="3" y1="10" x2="21" y2="10" />
                </svg>
                Upcoming Events
            </button>
            <button class="tab-btn" id="tabPast" onclick="switchTab('past')">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10" />
                    <polyline points="12 6 12 12 16 14" />
                </svg>
                Past Events & Photos
            </button>
        </div>

        <!-- Upcoming Section -->
        <div id="upcoming" class="tab-section active">
            <div class="premium-header-wrap reveal">
                <span class="section-badge">Stay Updated</span>
                <h2>Upcoming Events</h2>
            </div>
            <div id="upcoming-events-grid" class="events-grid reveal" style="transition-delay:0.3s;"></div>
        </div>

        <!-- Past Section -->
        <div id="past" class="tab-section">
            <div class="premium-header-wrap reveal">
                <span class="section-badge">Memories</span>
                <h2>Past Events</h2>
            </div>
            <div id="past-events-grid" class="events-grid reveal" style="transition-delay:0.3s;opacity:0.9;"></div>

            <!-- Photo Gallery -->
            <div style="margin-top:8rem;" class="reveal">
                <div class="premium-header-wrap">
                    <span class="section-badge">Highlights</span>
                    <h2>Event Photo Gallery</h2>
                    <p style="color:var(--text-muted);margin-top:1rem;">Memories from our past gatherings and reunions
                        worldwide.</p>
                </div>
                <div class="photo-gallery" id="photoGallery">
                    <!-- Photos rendered by JS below -->
                </div>
            </div>
        </div>
    </main>

    <!-- Footer Component Placeholder -->
    <div id="footer-placeholder"></div>

    <button class="back-to-top" id="backToTop" title="Back to Top" aria-label="Back to top">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="18 15 12 9 6 15" />
        </svg>
    </button>
    <div class="toast-container" id="toastContainer"></div>

    <!-- Scripts -->
    <script src="/js/data/alumni.js"></script>
    <script src="/js/data/events.js"></script>
    <script src="/js/core/components.js"></script>
    <script src="/js/core/main.js"></script>
    <script>
        function switchTab(tab) {
            document.querySelectorAll('.tab-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            const targetSection = document.getElementById(tab);
            if (targetSection) targetSection.classList.add('active');
            const targetTab = document.getElementById(`tab${tab.charAt(0).toUpperCase() + tab.slice(1)}`);
            if (targetTab) targetTab.classList.add('active');
        }

        // Check for hash to auto-switch tab
        if (window.location.hash === '#past') switchTab('past');

        document.addEventListener('DOMContentLoaded', () => {
            const upcomingGrid = document.getElementById('upcoming-events-grid');
            const pastGrid = document.getElementById('past-events-grid');
            if (typeof eventsData === 'undefined') return;

            function renderEvent(event) {
                const rsvpKey = `rsvp-${event.id}`;
                const hasRSVP = localStorage.getItem(rsvpKey) === 'true';
                const isPast = event.category === 'Past';
                const imgSrc = event.image;
                return `
                    <div class="event-card reveal">
                        <div class="event-img" style="position:relative;height:200px;overflow:hidden;">
                            <img src="${imgSrc}" alt="${event.title}" loading="lazy" style="width:100%;height:100%;object-fit:cover;">
                            <div class="event-date-badge">
                                <b>${event.date.split(' ')[0]}</b><br>
                                <span style="font-size:0.8rem;font-weight:700;">${event.date.split(' ')[1].replace(',', '')}</span>
                            </div>
                            ${isPast ? '<div style="position:absolute;top:1rem;left:1rem;background:rgba(0,0,0,0.55);color:white;padding:0.3rem 0.8rem;border-radius:20px;font-size:0.8rem;font-weight:700;backdrop-filter:blur(4px);">Past</div>' : ''}
                        </div>
                        <div class="event-content" style="padding:2rem;">
                            <h3 class="event-title">${event.title}</h3>
                            <div style="display:flex;gap:1.5rem;font-size:0.9rem;color:var(--text-muted);margin-bottom:1rem;flex-wrap:wrap;">
                                <span style="display:flex;align-items:center;gap:0.35rem;"><svg xmlns='http://www.w3.org/2000/svg' width='13' height='13' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2.5'><path d='M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z'/><circle cx='12' cy='10' r='3'/></svg>${event.location}</span>
                                <span style="display:flex;align-items:center;gap:0.35rem;"><svg xmlns='http://www.w3.org/2000/svg' width='13' height='13' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2.5'><circle cx='12' cy='12' r='10'/><polyline points='12 6 12 12 16 14'/></svg>${event.time}</span>
                            </div>
                            <p style="color:var(--text-muted);margin-bottom:1.5rem;">${event.description}</p>
                            <div style="display:flex;justify-content:space-between;align-items:center;gap:1rem;">
                                <span style="font-size:0.85rem;color:var(--text-muted);">👥 ${event.rsvpCount} ${isPast ? 'attended' : 'registered'}</span>
                                ${isPast ? '' : `<button class="btn-rsvp rsvp-btn" data-id="${event.id}" style="${hasRSVP ? 'background:var(--nav-navy);color:white;opacity:0.7;pointer-events:none;' : ''}">${hasRSVP ? '✓ Registered' : 'RSVP Now'}</button>`}
                            </div>
                        </div>
                    </div>`;
            }

            if (upcomingGrid) upcomingGrid.innerHTML = eventsData.filter(e => e.category === 'Upcoming').map(renderEvent).join('') || '<p style="color:var(--text-muted);padding:2rem;grid-column:1/-1;">No upcoming events at the moment. Check back soon!</p>';
            if (pastGrid) pastGrid.innerHTML = eventsData.filter(e => e.category === 'Past').map(renderEvent).join('') || '<p style="color:var(--text-muted);padding:2rem;grid-column:1/-1;">No past events yet.</p>';

            // Photo gallery for past events
            const galleryPhotos = [
                '/assets/img/college/college-2.jpeg',
                '/assets/img/college/college-4.jpeg',
                '/assets/img/college/college-8.jpeg',
                '/assets/img/college/college-10.jpeg',
                '/assets/img/college/college-11.jpeg',
                '/assets/img/college/college-15.jpeg',
                '/assets/img/college/college-18.jpeg',
                '/assets/img/college/college-19.jpeg',
            ];
            const gallery = document.getElementById('photoGallery');
            if (gallery) gallery.innerHTML = galleryPhotos.map((src, i) => `
                <div class="gallery-img reveal" style="transition-delay:${i * 0.07}s;">
                    <img src="${src}" alt="Alumni Event Photo ${i + 1}" loading="lazy">
                </div>`).join('');

            // RSVP
            document.querySelectorAll('.rsvp-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const id = btn.dataset.id;
                    localStorage.setItem(`rsvp-${id}`, 'true');
                    btn.innerHTML = '✓ Registered';
                    btn.style.opacity = '0.7';
                    btn.style.pointerEvents = 'none';
                    const toast = document.createElement('div');
                    toast.className = 'toast';
                    toast.textContent = '✅ You have successfully RSVP\'d to this event!';
                    const container = document.getElementById('toastContainer');
                    if (container) container.appendChild(toast);
                    setTimeout(() => toast.remove(), 3500);
                });
            });

            setTimeout(() => {
                document.querySelectorAll('.event-card, .gallery-img').forEach(el => el.classList.add('active'));
            }, 100);
        });
    </script>
</body>

</html>
