<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | BCE Setu</title>
    <meta name="description" content="Secure login for BCE Setu Alumni Portal administrators.">
    <link rel="icon" href="../assets/images/alumni-cell-logo.png" type="image/png">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        body { background: linear-gradient(135deg, hsl(var(--primary)) 0%, hsl(var(--primary-light)) 100%); min-height:100vh; display:flex; align-items:center; justify-content:center; }
        .admin-login-wrap { width: 100%; max-width: 440px; padding: 1rem; }
        .admin-login-card {
            background: rgba(255,255,255,0.07);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: var(--radius-lg);
            padding: 3rem;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }
        .admin-logo { text-align:center; margin-bottom:2.5rem; }
        .admin-logo img { width:70px; height:70px; object-fit:contain; margin-bottom:0.75rem; filter:brightness(0) invert(1); display:block; margin:0 auto 0.75rem; }
        .admin-logo h1 { color:white; font-size:1.8rem; margin-bottom:0.25rem; }
        .admin-logo p { color:rgba(255,255,255,0.65); font-size:0.9rem; }
        .form-group { margin-bottom:1.5rem; }
        .form-group label { display:block; color:rgba(255,255,255,0.8); font-size:0.88rem; font-weight:600; margin-bottom:0.5rem; text-transform:uppercase; letter-spacing:0.05em; }
        .form-group input {
            width:100%; padding:0.9rem 1rem; background:rgba(255,255,255,0.1);
            border:1.5px solid rgba(255,255,255,0.2); border-radius:10px; color:white;
            font-family:inherit; font-size:0.95rem; outline:none; transition:border-color 0.2s;
        }
        .form-group input::placeholder { color:rgba(255,255,255,0.4); }
        .form-group input:focus { border-color:hsl(var(--secondary)); }
        .pwd-wrapper { position:relative; }
        .pwd-wrapper input { padding-right:3rem; }
        .pwd-eye { position:absolute; right:1rem; top:50%; transform:translateY(-50%); background:none; border:none; color:rgba(255,255,255,0.6); cursor:pointer; font-size:1.1rem; }
        .error-msg { color:#fca5a5; font-size:0.85rem; margin-top:0.5rem; display:none; }
        .error-msg.show { display:block; }
        .btn-admin-login {
            width:100%; padding:1rem; margin-top:0.5rem;
            background:linear-gradient(135deg,hsl(var(--secondary)),hsl(var(--accent)));
            color:hsl(var(--primary)); border:none; border-radius:var(--radius-full);
            font-weight:800; font-size:1rem; cursor:pointer; transition:var(--transition-fast);
        }
        .btn-admin-login:hover { transform:translateY(-2px); box-shadow:0 8px 20px rgba(0,0,0,0.3); }
        .btn-admin-login:disabled { opacity:0.6; cursor:not-allowed; transform:none; }
        .hint-box { background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1); border-radius:10px; padding:1rem 1.25rem; margin-top:1.5rem; }
        .hint-box p { color:rgba(255,255,255,0.6); font-size:0.82rem; margin:0; line-height:1.6; }
        .hint-box strong { color:rgba(255,255,255,0.85); }
        .back-link { text-align:center; margin-top:1.5rem; }
        .back-link a { color:rgba(255,255,255,0.6); font-size:0.875rem; transition:color 0.2s; }
        .back-link a:hover { color:hsl(var(--secondary)); }
        @keyframes shake {
            0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)} 40%{transform:translateX(8px)} 60%{transform:translateX(-5px)} 80%{transform:translateX(5px)}
        }
        .shake { animation:shake 0.4s; }
    </style>
</head>
<body>
    <div class="admin-login-wrap">
        <div class="admin-login-card">
            <div class="admin-logo">
                <img src="../assets/images/alumni-cell-logo.png" alt="BCE Alumni Cell Logo">
                <h1>BCE<span style="color:hsl(var(--secondary));">Setu</span> Admin</h1>
                <p>Secure Portal — Authorised Access Only</p>
            </div>

            <form id="adminLoginForm" novalidate>
                <div class="form-group">
                    <label for="adminEmail">Administrator Email</label>
                    <input type="email" id="adminEmail" name="adminEmail" placeholder="admin@bcesetu.ac.in" autocomplete="username" required>
                </div>
                <div class="form-group">
                    <label for="adminPassword">Password</label>
                    <div class="pwd-wrapper">
                        <input type="password" id="adminPassword" name="adminPassword" placeholder="••••••••" autocomplete="current-password" required>
                        <button type="button" class="pwd-eye" id="toggleAdminPwd">👁️</button>
                    </div>
                    <div class="error-msg" id="loginError">⚠️ Invalid credentials. Please try again.</div>
                </div>
                <button type="submit" class="btn-admin-login" id="loginBtn">🔐 Sign In to Dashboard</button>
            </form>

            <div class="hint-box">
                <p>🔑 Demo credentials:<br>
                Email: <strong>admin@bcesetu.ac.in</strong><br>
                Password: <strong>admin@2026</strong></p>
            </div>

            <div class="back-link">
                <a href="../index.html">← Back to public portal</a>
            </div>
        </div>
    </div>

    <script>
        const ADMIN_EMAIL = 'admin@bcesetu.ac.in';
        const ADMIN_PASS  = 'admin@2026';

        const form   = document.getElementById('adminLoginForm');
        const emailI = document.getElementById('adminEmail');
        const passI  = document.getElementById('adminPassword');
        const errMsg = document.getElementById('loginError');
        const loginBtn = document.getElementById('loginBtn');

        // Password toggle
        document.getElementById('toggleAdminPwd').addEventListener('click', () => {
            const type = passI.getAttribute('type') === 'password' ? 'text' : 'password';
            passI.setAttribute('type', type);
            document.getElementById('toggleAdminPwd').textContent = type === 'password' ? '👁️' : '🔒';
        });

        form.addEventListener('submit', e => {
            e.preventDefault();
            errMsg.classList.remove('show');
            loginBtn.disabled = true;
            loginBtn.textContent = 'Verifying…';

            setTimeout(() => {
                if (emailI.value.trim() === ADMIN_EMAIL && passI.value === ADMIN_PASS) {
                    loginBtn.textContent = '✅ Authenticated — Redirecting…';
                    sessionStorage.setItem('bce-admin-auth', 'true');
                    setTimeout(() => window.location.href = 'dashboard.html', 800);
                } else {
                    errMsg.classList.add('show');
                    form.classList.add('shake');
                    setTimeout(() => form.classList.remove('shake'), 500);
                    loginBtn.disabled = false;
                    loginBtn.textContent = '🔐 Sign In to Dashboard';
                }
            }, 700);
        });
    </script>
</body>
</html>
