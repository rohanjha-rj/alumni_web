<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | BCE Setu</title>
    <meta name="description" content="Secure login for BCE Setu Alumni Portal administrators.">
    <link rel="icon" href="../assets/images/alumni-cell-logo.png" type="image/png">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        body {
            background: linear-gradient(140deg, hsl(var(--primary)) 0%, hsl(220,50%,20%) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Outfit', sans-serif;
        }

        /* Background grid pattern */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);
            background-size: 44px 44px;
            z-index: 0;
            pointer-events: none;
        }

        .login-wrap {
            width: 100%;
            max-width: 420px;
            padding: 1.25rem;
            position: relative;
            z-index: 1;
        }

        .login-card {
            background: rgba(255,255,255,.06);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255,255,255,.12);
            border-radius: 22px;
            padding: 2.75rem 2.5rem;
            box-shadow: 0 32px 64px rgba(0,0,0,.35);
        }

        /* Logo */
        .login-brand {
            text-align: center;
            margin-bottom: 2.5rem;
        }
        .login-brand-icon {
            width: 64px; height: 64px;
            background: linear-gradient(135deg, hsl(var(--secondary)), hsl(var(--accent)));
            border-radius: 18px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1rem;
        }
        .login-brand-icon svg { width: 30px; height: 30px; stroke: hsl(var(--primary)); stroke-width: 2; }
        .login-brand h1 {
            color: #fff;
            font-size: 1.65rem;
            font-weight: 800;
            letter-spacing: -.02em;
            margin: 0 0 .35rem;
        }
        .login-brand h1 span { color: hsl(var(--secondary)); }
        .login-brand p {
            color: rgba(255,255,255,.5);
            font-size: .82rem;
            margin: 0;
            letter-spacing: .03em;
        }

        /* Form */
        .form-group { margin-bottom: 1.35rem; }
        .form-group label {
            display: block;
            color: rgba(255,255,255,.72);
            font-size: .75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .06em;
            margin-bottom: .5rem;
        }

        .input-wrap {
            position: relative;
            display: flex;
            align-items: center;
        }
        .input-icon {
            position: absolute;
            left: 1rem;
            color: rgba(255,255,255,.35);
            display: flex; align-items: center;
            pointer-events: none;
        }
        .input-icon svg { width: 16px; height: 16px; stroke-width: 2; }

        .form-group input {
            width: 100%;
            padding: .9rem 1rem .9rem 2.85rem;
            background: rgba(255,255,255,.08);
            border: 1.5px solid rgba(255,255,255,.14);
            border-radius: 12px;
            color: #fff;
            font-family: inherit;
            font-size: .95rem;
            outline: none;
            transition: border-color .2s, background .2s;
        }
        .form-group input::placeholder { color: rgba(255,255,255,.3); }
        .form-group input:focus {
            border-color: hsl(var(--secondary));
            background: rgba(255,255,255,.11);
        }

        .pwd-toggle {
            position: absolute;
            right: .9rem;
            background: none; border: none;
            color: rgba(255,255,255,.4);
            cursor: pointer;
            display: flex; align-items: center;
            padding: .3rem;
            border-radius: 6px;
            transition: color .2s;
        }
        .pwd-toggle:hover { color: rgba(255,255,255,.8); }
        .pwd-toggle svg { width: 16px; height: 16px; stroke-width: 2; }

        /* Error */
        .error-msg {
            display: none;
            align-items: center;
            gap: .5rem;
            color: #fca5a5;
            font-size: .82rem;
            margin-top: .55rem;
            padding: .5rem .75rem;
            background: rgba(239,68,68,.12);
            border-radius: 8px;
            border: 1px solid rgba(239,68,68,.2);
        }
        .error-msg.show { display: flex; }
        .error-msg svg { width: 14px; height: 14px; stroke-width: 2; flex-shrink: 0; }

        /* Submit */
        .btn-login {
            width: 100%;
            padding: 1rem;
            margin-top: .5rem;
            background: linear-gradient(135deg, hsl(var(--secondary)), hsl(var(--accent)));
            color: hsl(var(--primary));
            border: none;
            border-radius: var(--radius-full);
            font-family: inherit;
            font-size: .98rem;
            font-weight: 800;
            cursor: pointer;
            transition: all .2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: .6rem;
            letter-spacing: .01em;
        }
        .btn-login svg { width: 17px; height: 17px; stroke-width: 2.2; }
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 12px 28px rgba(0,0,0,.35); }
        .btn-login:disabled { opacity: .58; cursor: not-allowed; transform: none; box-shadow: none; }

        /* Hint */
        .hint-box {
            background: rgba(255,255,255,.05);
            border: 1px solid rgba(255,255,255,.09);
            border-radius: 12px;
            padding: 1rem 1.2rem;
            margin-top: 1.5rem;
        }
        .hint-box-title {
            display: flex; align-items: center; gap: .5rem;
            font-size: .75rem; font-weight: 700;
            color: rgba(255,255,255,.5);
            text-transform: uppercase; letter-spacing: .07em;
            margin-bottom: .6rem;
        }
        .hint-box-title svg { width: 13px; height: 13px; stroke-width: 2; }
        .hint-box p { color: rgba(255,255,255,.55); font-size: .82rem; margin: 0; line-height: 1.7; }
        .hint-box strong { color: rgba(255,255,255,.82); font-weight: 700; }

        /* Back link */
        .back-link {
            text-align: center;
            margin-top: 1.5rem;
        }
        .back-link a {
            display: inline-flex; align-items: center; gap: .4rem;
            color: rgba(255,255,255,.45);
            font-size: .82rem;
            transition: color .2s;
            text-decoration: none;
        }
        .back-link a:hover { color: hsl(var(--secondary)); }
        .back-link a svg { width: 14px; height: 14px; stroke-width: 2; }

        /* Shake animation */
        @keyframes shake {
            0%,100% { transform: translateX(0); }
            20%      { transform: translateX(-7px); }
            40%      { transform: translateX(7px); }
            60%      { transform: translateX(-4px); }
            80%      { transform: translateX(4px); }
        }
        .shake { animation: shake .4s ease-in-out; }
    </style>
</head>
<body>
<div class="login-wrap">
    <div class="login-card">

        <!-- Brand -->
        <div class="login-brand">
            <div class="login-brand-icon">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>
            </div>
            <h1>BCE<span>Setu</span> Admin</h1>
            <p>Secure Portal — Authorised Access Only</p>
        </div>

        <!-- Form -->
        <form id="adminLoginForm" novalidate>
            <div class="form-group">
                <label for="adminEmail">Administrator Email</label>
                <div class="input-wrap">
                    <span class="input-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                    </span>
                    <input type="email" id="adminEmail" name="adminEmail"
                           placeholder="admin@bcesetu.ac.in" autocomplete="username" required>
                </div>
            </div>

            <div class="form-group">
                <label for="adminPassword">Password</label>
                <div class="input-wrap">
                    <span class="input-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                    </span>
                    <input type="password" id="adminPassword" name="adminPassword"
                           placeholder="••••••••" autocomplete="current-password" required>
                    <button type="button" class="pwd-toggle" id="togglePwd" aria-label="Show/hide password">
                        <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                    </button>
                </div>
                <div class="error-msg" id="loginError">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
                    Invalid credentials. Please try again.
                </div>
            </div>

            <button type="submit" class="btn-login" id="loginBtn">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
                Sign In to Dashboard
            </button>
        </form>

        <!-- Hint -->
        <div class="hint-box">
            <div class="hint-box-title">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                Demo credentials
            </div>
            <p>
                Email: <strong>admin@bcesetu.ac.in</strong><br>
                Password: <strong>admin@2026</strong>
            </p>
        </div>

        <!-- Back -->
        <div class="back-link">
            <a href="../index.html">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
                Back to public portal
            </a>
        </div>
    </div>
</div>

<script>
    const ADMIN_EMAIL = 'admin@bcesetu.ac.in';
    const ADMIN_PASS  = 'admin@2026';

    const form     = document.getElementById('adminLoginForm');
    const emailEl  = document.getElementById('adminEmail');
    const passEl   = document.getElementById('adminPassword');
    const errEl    = document.getElementById('loginError');
    const loginBtn = document.getElementById('loginBtn');

    /* Sync theme to avoid flash */
    (function() {
        const t = localStorage.getItem('theme') || 'light';
        document.body.setAttribute('data-theme', t);
    })();

    /* Password visibility toggle */
    document.getElementById('togglePwd').addEventListener('click', function() {
        const isHidden = passEl.type === 'password';
        passEl.type = isHidden ? 'text' : 'password';
        document.getElementById('eyeIcon').innerHTML = isHidden
            ? `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>`
            : `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
    });

    /* Submit */
    form.addEventListener('submit', function(e) {
        e.preventDefault();
        errEl.classList.remove('show');
        loginBtn.disabled = true;
        loginBtn.innerHTML = `
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" width="17" height="17" stroke-width="2.2">
                <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
            </svg>
            Verifying…`;

        const storedPass = localStorage.getItem('bce_admin_pass') || ADMIN_PASS;

        setTimeout(() => {
            if (emailEl.value.trim() === ADMIN_EMAIL && passEl.value === storedPass) {
                loginBtn.innerHTML = `
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" width="17" height="17" stroke-width="2.2">
                        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>
                    </svg>
                    Authenticated — Redirecting…`;
                sessionStorage.setItem('bce-admin-auth', 'true');
                setTimeout(() => window.location.href = 'dashboard.html', 750);
            } else {
                errEl.classList.add('show');
                form.classList.add('shake');
                setTimeout(() => form.classList.remove('shake'), 450);
                loginBtn.disabled = false;
                loginBtn.innerHTML = `
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" width="17" height="17" stroke-width="2.2">
                        <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
                        <polyline points="10 17 15 12 10 7"/>
                        <line x1="15" y1="12" x2="3" y2="12"/>
                    </svg>
                    Sign In to Dashboard`;
            }
        }, 700);
    });
</script>
</body>
</html>
