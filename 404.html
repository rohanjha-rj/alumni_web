<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Page Not Found | BCE Alumni Welfare Association</title>
    <link rel="icon" href="/assets/img/branding/logo.png" type="image/png">
    
    <!-- Modular Styles -->
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/layout.css">
    <link rel="stylesheet" href="/css/components.css">
    
    <style>
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            background: var(--bg-main);
        }

        .error-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 6rem 2rem;
            position: relative;
            overflow: hidden;
        }

        /* Abstract background element */
        .error-bg-shape {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(250, 204, 21, 0.08) 0%, rgba(255, 255, 255, 0) 70%);
            z-index: 0;
            pointer-events: none;
        }

        .error-content {
            text-align: center;
            position: relative;
            z-index: 1;
            max-width: 600px;
            animation: fadeIn 0.8s ease-out;
        }

        .error-code {
            font-size: clamp(8rem, 20vw, 12rem);
            font-weight: 900;
            line-height: 1;
            color: var(--nav-navy);
            margin-bottom: 1.5rem;
            letter-spacing: -0.05em;
            position: relative;
            display: inline-block;
        }

        .error-code::after {
            content: '404';
            position: absolute;
            top: 4px;
            left: 4px;
            z-index: -1;
            color: var(--modern-gold);
            opacity: 0.3;
        }

        .error-title {
            font-size: 2.5rem;
            margin-bottom: 1.5rem;
            color: var(--nav-navy);
            font-family: 'Poppins', sans-serif;
        }

        .error-msg {
            color: var(--text-muted);
            font-size: 1.2rem;
            margin-bottom: 3rem;
            line-height: 1.7;
        }

        .home-btn {
            gap: 0.75rem;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<body>
    <!-- Header Component Placeholder -->
    <div id="header-placeholder"></div>

    <main class="error-container">
        <div class="error-bg-shape"></div>
        <div class="error-content">
            <div class="error-code">404</div>
            <h1 class="error-title">Lost in the Network?</h1>
            <p class="error-msg">The page you're looking for seems to have vanished or moved. Let's get you back to the BCE Alumni Welfare Association home page.</p>
            <a href="/index.html" class="btn-primary home-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
                Return to Home
            </a>
        </div>
    </main>

    <!-- Footer Component Placeholder -->
    <div id="footer-placeholder"></div>

    <!-- Scripts -->
    <script src="/js/core/components.js"></script>
    <script src="/js/core/main.js"></script>
</body>

</html>
