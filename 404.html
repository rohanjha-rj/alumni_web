<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Page Not Found | BCE Alumni Welfare Association</title>
    <link rel="icon" href="assets/images/association-logo.png" type="image/png">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, hsl(var(--primary)), hsl(var(--primary-light)));
        }

        .error-box {
            text-align: center;
            color: white;
            padding: 3rem;
        }

        .error-code {
            font-size: 10rem;
            font-weight: 900;
            line-height: 1;
            color: hsl(var(--secondary));
            opacity: 0.8;
        }

        .error-title {
            font-size: 2rem;
            margin: 1rem 0;
        }

        .error-msg {
            color: rgba(255, 255, 255, 0.7);
            font-size: 1.1rem;
            max-width: 500px;
            margin: 0 auto 2.5rem;
        }

        .home-btn {
            display: inline-block;
            padding: 1rem 2.5rem;
            background: hsl(var(--secondary));
            color: hsl(var(--primary));
            border-radius: var(--radius-full);
            font-weight: 700;
            font-size: 1rem;
        }
    </style>
</head>

<body>
    <div class="error-box">
        <img src="assets/images/association-logo.png" alt="BCE Alumni Welfare Association" style="height:80px;width:auto;border-radius:50%;background:white;padding:6px;margin-bottom:1.5rem;">
        <div class="error-code">404</div>
        <h1 class="error-title">Page Not Found</h1>
        <p class="error-msg">The page you're looking for doesn't exist or has been moved. Let's get you back to the BCE Alumni Welfare Association home page.</p>
        <a href="index.html" class="home-btn">← Return to Home</a>
    </div>
</body>

</html>
